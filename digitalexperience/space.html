<!DOCTYPE html>

<head>

     <script src="https://unpkg.com/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>
<style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      background: rgba(179, 27, 27, 0.92);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      text-align: center;
    }

    #startOverlay h1 {
      margin-bottom: 12px;
      font-size: 2rem;
    }

    #startOverlay p {
      margin-bottom: 24px;
      max-width: 500px;
      padding: 0 20px;
      line-height: 1.5;
    }

    #startButton {
      padding: 14px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #startOverlay.hidden {
      display: none;
    }
  </style>
</head>
<body>

     <div id="startOverlay">
    <h1>Welcome</h1>
    <p>Click below to start the experience and enable sound.</p>
    <button id="startButton">Start Experience</button>

    const startButton = document.querySelector('#startButton');
    const startOverlay = document.querySelector('#startOverlay');

    startButton.addEventListener('click', () => {
      const sounds = document.querySelectorAll('a-sound');

      sounds.forEach((el) => {
        if (el.components.sound) {

        }
      });

      startOverlay.classList.add('hidden');
    });
