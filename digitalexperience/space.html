<!DOCTYPE html>
<html lang="en">

<body>

    <a-scene>

        <img id="klaus" src="assets/klaus.png" />
        <img id="waterfall" src="assets/waterfall.png" />

        <a-mixin id="floor" geometry="primitive: box; height: 0.5 " material="emissive: #ede5dd; src: #floor-pattern; metalness: 0.5; roughness: 0.5" shadow ></a-mixin>
        <a-mixin id="wall" geometry="primitive: box; depth: 0.5 " material="color: #f3efed; metalness: 0.5; roughness: 0.5" shadow static-body ></a-mixin>
        <a-mixin id="roof" geometry="primitive: box; height: 0.5 " material="emissive: #e3dcd4; src: #roof-pattern; metalness: 0.25" class="floor" shadow ></a-mixin>
        <a-mixin id="window" geometry="primitive: box; depth: 0.5" material="color: #f6eae6; metalness: 0.5; opacity: 0.25" shadow static-body ></a-mixin>
        <a-mixin id="light" geometry="primitive: cylinder; radius: 0.125; height: 4.5" material="color: #6fc7b4; opacity: 0.75" shadow ></a-mixin>

    </a-assets>

    <a-entity id="player" position="0 1.6 0">
            <!-- camera -->
            <a-entity id="camera" camera wasd-controls look-controls></a-entity>
            <!-- hand controls -->
            <a-entity id="left-hand" raycaster="objects: .floor" oculus-touch-controls="hand: left" blink-controls></a-entity>
            <a-entity id="right-hand" raycaster="objects: .floor" oculus-touch-controls="hand: right" blink-controls></a-entity>
    </a-entity>

    <a-sky src="#space" repeat="10 10"></a-sky>
