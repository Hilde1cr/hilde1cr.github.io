<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
    <a-scene background="color: #FAFAFA">
    <a-entity position="0 0 0 ">
        <a-sphere position="3 1.25 -5" radius="1.25" color="#EF2D5E" shadow></a-sphere>
        <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E" material="roughness: 1" shadow></a-sphere>
        <a-sphere position="-3 1.25 -5" radius="1.25" color="#yellow" material="metalness: 1" shadow></a-sphere>
        <a-plane position="0 0 -4" rotation="-90 0 0" width="12" height="12" color="#7BC8A4" shadow></a-plane>
    </a-entity>

     <a-entity position="-14 0 0 ">
        <a-sphere position="3 1.25 -5" radius="1.25" color="#EF2D5E" shadow></a-sphere>
        <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E" material="roughness: 1" shadow></a-sphere>
        <a-sphere position="-3 1.25 -5" radius="1.25" color="#yellow" material="metalness: 1" shadow></a-sphere>
        <a-plane position="0 0 -4" rotation="-90 0 0" width="12" height="12" color="#7BC8A4" shadow></a-plane>
    </a-entity>

    </a-scene>
    
    
</body>
</html>
